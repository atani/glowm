name: Feature request
description: Suggest an idea for glowm
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
      placeholder: "I want to read/export/share Markdown docs with..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like glowm to do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Markdown rendering
        - Mermaid rendering
        - PDF export
        - Terminal image support
        - Pager / navigation
        - Installation / packaging
        - Documentation
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
